server {
    listen 8000;
    server_name _;
    root /var/www/html/public;
    pid /run/nginx.pid;
    index index.php index.html;

    server_tokens off;

    charset utf-8;

    # Rate limiting (shared across all Laravel workers)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_status 429;

    # Request size limits
    client_max_body_size 12M;
    client_body_buffer_size 128k;
    client_header_buffer_size 8k;
    large_client_header_buffers 4 16k;

    # Timeouts
    fastcgi_read_timeout 30;
    proxy_read_timeout 30;
    client_body_timeout 15;
    client_header_timeout 15;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Remove powered-by headers
    proxy_hide_header X-Powered-By;
    fastcgi_hide_header X-Powered-By;

    # Deny access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive paths
    location ~ ^/(\.env|composer\.(json|lock|phar)|artisan|storage/|vendor/|node_modules/) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Health check (no rate limit, light)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        limit_req zone=api burst=20 nodelay;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_intercept_errors on;

        # Deny dangerous query params
        if ($args ~* "(\%00|(\<\s*script)|(\b(select|union|insert|drop|alter|truncate)\b))") {
            return 403;
        }
    }

    error_page 404 /index.php;
    error_page 429 /index.php;
    error_page 500 502 503 504 /index.php;
}
