services:
  # ── Reverse Proxy (public-facing only) ──
  app:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API (backend) ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-basileia}
      - DB_USERNAME=${DB_USERNAME:-basileia}
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - APP_URL=${APP_URL:-https://secure.basileia.global}
      - FRONTEND_URL=${FRONTEND_URL:-https://secure.basileia.global}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - internal
    volumes:
      - api_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Dashboard (frontend) ──
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL (internal only) ──
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-basileia}
      POSTGRES_USER: ${DB_USERNAME:-basileia}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-basileia} -d ${DB_DATABASE:-basileia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (internal only, for queue/cache when configured) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    profiles:
      - queue
      - cache

volumes:
  pgdata:
  redis_data:
  api_storage:

networks:
  proxy:
    driver: bridge
    internal: false
  internal:
    driver: bridge
    internal: true
