# Reverse proxy with WAF-like rules, rate limiting, and security headers

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=burst_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_external:10m rate=20r/s;
limit_req_status 429;

# Bad bot / scanner blocking
map $http_user_agent $is_bad_bot {
    default 0;
    ~*(nmap|sqlmap|nikto|acunetix|nessus|openvas|burpsuite|masscan|zmap) 1;
    ~*(ruby|python-requests|python-urllib|curl|wget|scrapy|phpstorm) 1;
    ~*(go-http-client|java/|libwww-perl|perl|winhttp) 1;
}

# Block common attack patterns in query string
map $query_string $is_attack_query {
    default 0;
    ~*(\%00|(\bselect\b.*\bfrom\b)|(\bunion\b.*\bselect\b)|(\binsert\b.*\binto\b)|(\bdrop\b.*\btable\b)|(\bexec\b.*\(|xp_cmdshell|pg_sleep|sleep\()) 1;
    ~*(\.\./|\.\.%2f|%00|eval\(|base64_decode|document\.cookie) 1;
}

server {
    listen 8000;
    server_name _;

    server_tokens off;
    charset utf-8;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Request size limits ──
    client_max_body_size 12M;
    client_body_buffer_size 128k;
    client_header_buffer_size 8k;
    large_client_header_buffers 4 16k;

    # ── Timeouts ──
    proxy_connect_timeout 10;
    proxy_send_timeout 15;
    proxy_read_timeout 30;
    send_timeout 15;

    # ── Security headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Block bad bots ──
    if ($is_bad_bot) {
        return 444;
    }

    # ── Block attack patterns ──
    if ($is_attack_query) {
        return 403;
    }

    # ── Deny access to sensitive extensions ──
    location ~* \.(env|log|sql|swp|bak|old|conf|yml|yaml|md|txt|git|svn|htaccess)$ {
        deny all;
        return 404;
    }

    # ── Next.js Dashboard (frontend) ──
    location / {
        limit_req zone=general burst=30 nodelay;

        set $dashboard "dashboard:3000";
        proxy_pass http://$dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_cache_bypass $http_upgrade;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── Laravel API (backend) ──
    location /api/ {
        limit_req zone=api_external burst=10 nodelay;

        set $api "api:8000";
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── Sanctum/CSRF cookie endpoint ──
    location /sanctum/ {
        limit_req zone=burst_auth burst=5 nodelay;

        set $api "api:8000";
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── Auth endpoints: stricter rate limit ──
    location ~ ^/api/(v1|v2)/auth/ {
        limit_req zone=burst_auth burst=3 nodelay;

        set $api "api:8000";
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Error pages ──
    error_page 404 /404.html;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
        return 404 '{"success":false,"error":{"code":"not_found"}}';
    }

    location = /429.html {
        internal;
        return 429 '{"success":false,"error":{"code":"rate_limited","message":"Too many requests"}}';
    }

    location = /50x.html {
        internal;
        return 500 '{"success":false,"error":{"code":"server_error"}}';
    }
}
